<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Трекер заказов — Ельдос</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
  .app { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 8px; }
  h1 span { font-size: 14px; font-weight: 400; color: #888; }

  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  @media(max-width:600px){ .stats-grid { grid-template-columns: repeat(2,1fr); } }
  .stat-card { background: #fff; border-radius: 10px; border: 0.5px solid #e5e5e5; padding: 0.875rem 1rem; }
  .stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .stat-val { font-size: 22px; font-weight: 600; color: #1a1a1a; }
  .stat-val.green { color: #0F6E56; }
  .stat-val.amber { color: #854F0B; }
  .stat-val.red { color: #A32D2D; }

  .tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; border-bottom: 1px solid #e5e5e5; }
  .tab { padding: 8px 16px; font-size: 14px; cursor: pointer; border: none; background: none; color: #888; border-bottom: 2px solid transparent; margin-bottom: -1px; display: flex; align-items: center; gap: 6px; }
  .tab.active { color: #1a1a1a; border-bottom: 2px solid #1a1a1a; font-weight: 500; }
  .tab:hover { color: #1a1a1a; }

  button.primary { background: #1a1a1a; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  button.primary:hover { background: #333; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.875rem; }
  .section-title { font-size: 15px; font-weight: 600; }

  .search-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 160px; }
  .search-wrap i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #aaa; font-size: 15px; pointer-events: none; }
  .search-wrap input { width: 100%; font-size: 13px; padding: 8px 10px 8px 32px; border: 0.5px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; outline: none; }
  .search-wrap input:focus { border-color: #aaa; }
  .filter-select { font-size: 13px; padding: 8px 10px; border: 0.5px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; outline: none; cursor: pointer; }

  .table-wrap { overflow-x: auto; background: #fff; border-radius: 12px; border: 0.5px solid #e5e5e5; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  th { text-align: left; color: #888; font-weight: 500; padding: 10px 10px; border-bottom: 0.5px solid #e5e5e5; font-size: 12px; white-space: nowrap; }
  td { padding: 9px 10px; border-bottom: 0.5px solid #f0f0f0; color: #1a1a1a; vertical-align: middle; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }

  .badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-new { background: #E6F1FB; color: #185FA5; }
  .badge-transit { background: #FAEEDA; color: #854F0B; }
  .badge-customs { background: #FBEAF0; color: #993556; }
  .badge-delivered { background: #EAF3DE; color: #3B6D11; }
  .badge-paid { background: #EAF3DE; color: #3B6D11; }
  .badge-unpaid { background: #FCEBEB; color: #A32D2D; }
  .badge-partial { background: #FAEEDA; color: #854F0B; }

  .action-btn { background: none; border: 0.5px solid #ddd; border-radius: 6px; padding: 4px 8px; font-size: 12px; cursor: pointer; color: #888; margin-right: 3px; }
  .action-btn:hover { background: #f5f5f5; color: #1a1a1a; }

  .overdue { color: #A32D2D; font-weight: 500; }
  .soon { color: #854F0B; font-weight: 500; }

  .empty { text-align: center; padding: 3rem; color: #aaa; font-size: 14px; }

  /* Modal */
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
  .modal { background: #fff; border-radius: 14px; border: 0.5px solid #e5e5e5; padding: 1.5rem; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; display: flex; justify-content: space-between; align-items: center; }
  .close-btn { background: none; border: none; cursor: pointer; color: #888; font-size: 22px; line-height: 1; padding: 0; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media(max-width:480px){ .form-row { grid-template-columns: 1fr; } }
  .form-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
  .form-group label { font-size: 12px; color: #888; font-weight: 500; }
  .form-group input, .form-group select, .form-group textarea { font-size: 13px; border-radius: 8px; border: 0.5px solid #ddd; padding: 8px 10px; background: #fff; color: #1a1a1a; width: 100%; outline: none; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #aaa; }
  .form-group textarea { resize: vertical; min-height: 64px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1.25rem; padding-top: 1rem; border-top: 0.5px solid #f0f0f0; }
  .btn-cancel { background: none; border: 0.5px solid #ddd; border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer; color: #888; }
  .btn-cancel:hover { background: #f5f5f5; }

  /* Clients */
  .client-card { background: #fff; border: 0.5px solid #e5e5e5; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 10px; }
  .client-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .avatar { width: 38px; height: 38px; border-radius: 50%; background: #E6F1FB; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #185FA5; flex-shrink: 0; }
  .client-name { font-weight: 600; font-size: 14px; }
  .client-meta { font-size: 12px; color: #888; }
  .client-stats { display: flex; gap: 20px; }
  .cs-val { font-weight: 600; font-size: 14px; }
  .cs-lbl { font-size: 11px; color: #888; }

  /* Finance */
  .finance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
  @media(max-width:500px){ .finance-grid { grid-template-columns: 1fr; } }
  .finance-card { background: #fff; border: 0.5px solid #e5e5e5; border-radius: 12px; padding: 1rem 1.25rem; }
  .finance-card-title { font-size: 13px; color: #888; font-weight: 500; margin-bottom: 0.75rem; }
  .frow { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 13px; border-bottom: 0.5px solid #f0f0f0; }
  .frow:last-child { border-bottom: none; }
  .frow-lbl { color: #888; }
  .frow-val { font-weight: 600; }
  .income { color: #0F6E56; }
  .expense { color: #A32D2D; }
  .profit-big { color: #185FA5; font-size: 16px; }

  /* Deadlines */
  .deadline-card { background: #fff; border: 0.5px solid #e5e5e5; border-radius: 12px; padding: 0.75rem 1.25rem; }
  .dl-item { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 0.5px solid #f0f0f0; }
  .dl-item:last-child { border-bottom: none; }
  .dl-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-red { background: #E24B4A; }
  .dot-amber { background: #EF9F27; }
  .dot-green { background: #639922; }
  .dl-info { flex: 1; }
  .dl-name { font-size: 13px; font-weight: 500; }
  .dl-sub { font-size: 12px; color: #888; margin-top: 2px; }
  .dl-date { font-size: 12px; font-weight: 500; white-space: nowrap; }

  /* Supplier tag */
  .supplier-tag { display: inline-block; background: #f5f5f5; color: #555; border-radius: 4px; font-size: 11px; padding: 2px 6px; }
</style>
</head>
<body>
<div class="app">
  <h1><i class="ti ti-package"></i> Трекер заказов <span id="dateLabel"></span></h1>
  <div class="stats-grid" id="statsGrid"></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('orders',this)"><i class="ti ti-list"></i> Заказы</button>
    <button class="tab" onclick="switchTab('clients',this)"><i class="ti ti-users"></i> Клиенты</button>
    <button class="tab" onclick="switchTab('finance',this)"><i class="ti ti-chart-bar"></i> Финансы</button>
    <button class="tab" onclick="switchTab('deadlines',this)"><i class="ti ti-calendar"></i> Дедлайны</button>
  </div>
  <div id="tab-orders"></div>
  <div id="tab-clients" style="display:none"></div>
  <div id="tab-finance" style="display:none"></div>
  <div id="tab-deadlines" style="display:none"></div>
  <div id="modal-container"></div>
</div>

<script>
const STATUS_LABELS = {new:"Новый", transit:"В пути", customs:"Таможня", delivered:"Доставлен"};
const STATUS_CLASS = {new:"badge-new", transit:"badge-transit", customs:"badge-customs", delivered:"badge-delivered"};
const PAY_LABELS = {paid:"Оплачен", unpaid:"Не оплачен", partial:"Частично"};
const PAY_CLASS = {paid:"badge-paid", unpaid:"badge-unpaid", partial:"badge-partial"};

function loadData() {
  const saved = localStorage.getItem('eldos_tracker');
  if (saved) return JSON.parse(saved);
  return {
    orders: [
      {id:1,client:"Айгуль Б.",product:"Чехлы для телефонов",supplier:"Shenzhen Tech",qty:200,costPrice:45000,salePrice:72000,status:"transit",payStatus:"paid",deadline:"2026-06-10",notes:"Отслеживание: YT2391827CN",material:"Силикон"},
      {id:2,client:"Даурен С.",product:"Наушники TWS",supplier:"Guangzhou Audio",qty:50,costPrice:62000,salePrice:95000,status:"customs",payStatus:"partial",deadline:"2026-06-05",notes:"Ждём разрешение таможни",material:"Пластик"},
      {id:3,client:"Мадина К.",product:"Светодиодные ленты",supplier:"Yiwu Lights",qty:500,costPrice:18000,salePrice:32000,status:"delivered",payStatus:"unpaid",deadline:"2026-05-28",notes:"Доставлено 28 мая",material:"LED"},
      {id:4,client:"Айгуль Б.",product:"Зарядные кабели USB-C",supplier:"Shenzhen Tech",qty:300,costPrice:22000,salePrice:38000,status:"new",payStatus:"paid",deadline:"2026-06-20",notes:"Заказ оформлен",material:"Металл"},
      {id:5,client:"Ерлан Н.",product:"Рюкзаки городские",supplier:"Guangzhou Bags",qty:30,costPrice:54000,salePrice:90000,status:"transit",payStatus:"paid",deadline:"2026-06-15",notes:"Отгружено 30 мая",material:"Ткань"},
    ],
    nextId: 6
  };
}

function saveData() { localStorage.setItem('eldos_tracker', JSON.stringify(data)); }

let data = loadData();
let filterStatus = 'all', filterPay = 'all', searchQ = '';
let currentTab = 'orders';

document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('ru-RU', {day:'numeric',month:'long',year:'numeric'});

function fmt(n) { return Math.round(n).toLocaleString('ru-RU'); }
function initials(name) { return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function today() { return new Date(); }
function daysUntil(dateStr) {
  const now = today(); now.setHours(0,0,0,0);
  const d = new Date(dateStr); d.setHours(0,0,0,0);
  return Math.round((d-now)/86400000);
}

function renderStats() {
  const o = data.orders;
  const active = o.filter(x=>x.status!=='delivered').length;
  const revenue = o.reduce((s,x)=>s+x.salePrice,0);
  const profit = o.reduce((s,x)=>s+(x.salePrice-x.costPrice),0);
  const unpaid = o.filter(x=>x.payStatus==='unpaid').length;
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-label">Всего заказов</div><div class="stat-val">${o.length}</div></div>
    <div class="stat-card"><div class="stat-label">Активных</div><div class="stat-val amber">${active}</div></div>
    <div class="stat-card"><div class="stat-label">Прибыль</div><div class="stat-val green">${fmt(profit/1000)}K ₸</div></div>
    <div class="stat-card"><div class="stat-label">Не оплачено</div><div class="stat-val red">${unpaid}</div></div>
  `;
}

function renderOrders() {
  let orders = data.orders.filter(o => {
    return (filterStatus==='all'||o.status===filterStatus) &&
           (filterPay==='all'||o.payStatus===filterPay) &&
           (!searchQ||o.client.toLowerCase().includes(searchQ)||o.product.toLowerCase().includes(searchQ)||o.supplier.toLowerCase().includes(searchQ));
  });
  document.getElementById('tab-orders').innerHTML = `
    <div class="section-header">
      <span class="section-title">Заказы (${orders.length})</span>
      <button class="primary" onclick="openModal()"><i class="ti ti-plus"></i> Добавить</button>
    </div>
    <div class="search-bar">
      <div class="search-wrap"><i class="ti ti-search"></i><input type="text" placeholder="Поиск..." oninput="searchQ=this.value.toLowerCase();renderOrders()" value="${searchQ}"></div>
      <select class="filter-select" onchange="filterStatus=this.value;renderOrders()">
        <option value="all"${filterStatus==='all'?' selected':''}>Все статусы</option>
        <option value="new"${filterStatus==='new'?' selected':''}>Новый</option>
        <option value="transit"${filterStatus==='transit'?' selected':''}>В пути</option>
        <option value="customs"${filterStatus==='customs'?' selected':''}>Таможня</option>
        <option value="delivered"${filterStatus==='delivered'?' selected':''}>Доставлен</option>
      </select>
      <select class="filter-select" onchange="filterPay=this.value;renderOrders()">
        <option value="all"${filterPay==='all'?' selected':''}>Все оплаты</option>
        <option value="paid"${filterPay==='paid'?' selected':''}>Оплачен</option>
        <option value="unpaid"${filterPay==='unpaid'?' selected':''}>Не оплачен</option>
        <option value="partial"${filterPay==='partial'?' selected':''}>Частично</option>
      </select>
    </div>
    ${orders.length===0?'<div class="empty"><i class="ti ti-package" style="font-size:32px;display:block;margin-bottom:8px"></i>Заказы не найдены</div>':`
    <div class="table-wrap"><table>
      <thead><tr>
        <th style="width:110px">Клиент</th>
        <th style="width:150px">Товар</th>
        <th style="width:110px">Поставщик</th>
        <th style="width:55px">Кол-во</th>
        <th style="width:90px">Прибыль</th>
        <th style="width:85px">Статус</th>
        <th style="width:80px">Оплата</th>
        <th style="width:85px">Дедлайн</th>
        <th style="width:80px">Действия</th>
      </tr></thead>
      <tbody>${orders.map(o=>{
        const profit = o.salePrice-o.costPrice;
        const days = daysUntil(o.deadline);
        const ddClass = days<0?'overdue':days<=3?'soon':'';
        const ddText = days<0?`${Math.abs(days)}д проср.`:days===0?'Сегодня!':days<=3?`${days}д осталось`:`${days} дн.`;
        return `<tr>
          <td title="${o.client}">${o.client}</td>
          <td title="${o.product}">${o.product}</td>
          <td title="${o.supplier}"><span class="supplier-tag">${o.supplier}</span></td>
          <td>${o.qty}</td>
          <td style="color:#0F6E56;font-weight:600">+${fmt(profit/1000)}K</td>
          <td><span class="badge ${STATUS_CLASS[o.status]}">${STATUS_LABELS[o.status]}</span></td>
          <td><span class="badge ${PAY_CLASS[o.payStatus]}">${PAY_LABELS[o.payStatus]}</span></td>
          <td class="dl-date ${ddClass}">${ddText}</td>
          <td>
            <button class="action-btn" onclick="openModal(${o.id})" title="Редактировать"><i class="ti ti-edit"></i></button>
            <button class="action-btn" onclick="deleteOrder(${o.id})" title="Удалить"><i class="ti ti-trash"></i></button>
          </td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`}
  `;
}

function renderClients() {
  const clients = {};
  data.orders.forEach(o=>{
    if(!clients[o.client]) clients[o.client]={name:o.client,orders:0,revenue:0,profit:0};
    clients[o.client].orders++;
    clients[o.client].revenue+=o.salePrice;
    clients[o.client].profit+=(o.salePrice-o.costPrice);
  });
  const list = Object.values(clients).sort((a,b)=>b.revenue-a.revenue);
  document.getElementById('tab-clients').innerHTML = `
    <div class="section-header"><span class="section-title">Клиенты (${list.length})</span></div>
    ${list.length===0?'<div class="empty">Нет клиентов</div>':list.map(c=>`
      <div class="client-card">
        <div class="client-header">
          <div class="avatar">${initials(c.name)}</div>
          <div><div class="client-name">${c.name}</div><div class="client-meta">${c.orders} заказ${c.orders>4?'ов':c.orders>1?'а':''}</div></div>
        </div>
        <div class="client-stats">
          <div><div class="cs-val">${fmt(c.revenue/1000)}K ₸</div><div class="cs-lbl">Выручка</div></div>
          <div><div class="cs-val" style="color:#0F6E56">+${fmt(c.profit/1000)}K ₸</div><div class="cs-lbl">Прибыль</div></div>
          <div><div class="cs-val">${Math.round(c.profit/c.revenue*100)}%</div><div class="cs-lbl">Маржа</div></div>
        </div>
      </div>
    `).join('')}
  `;
}

function renderFinance() {
  const o = data.orders;
  const rev = o.reduce((s,x)=>s+x.salePrice,0);
  const cost = o.reduce((s,x)=>s+x.costPrice,0);
  const profit = rev-cost;
  const paid = o.filter(x=>x.payStatus==='paid').reduce((s,x)=>s+x.salePrice,0);
  const unpaid = o.filter(x=>x.payStatus==='unpaid').reduce((s,x)=>s+x.salePrice,0);
  const partial = o.filter(x=>x.payStatus==='partial').reduce((s,x)=>s+x.salePrice,0);
  const byStatus = {};
  o.forEach(x=>{ if(!byStatus[x.status]) byStatus[x.status]={rev:0,profit:0,count:0}; byStatus[x.status].rev+=x.salePrice; byStatus[x.status].profit+=(x.salePrice-x.costPrice); byStatus[x.status].count++; });
  document.getElementById('tab-finance').innerHTML = `
    <div class="section-header"><span class="section-title">Финансы</span></div>
    <div class="finance-grid">
      <div class="finance-card">
        <div class="finance-card-title"><i class="ti ti-report-money"></i> Итого</div>
        <div class="frow"><span class="frow-lbl">Выручка</span><span class="frow-val income">${fmt(rev/1000)}K ₸</span></div>
        <div class="frow"><span class="frow-lbl">Себестоимость</span><span class="frow-val expense">−${fmt(cost/1000)}K ₸</span></div>
        <div class="frow" style="margin-top:6px;padding-top:6px;border-top:1px solid #eee"><span class="frow-lbl" style="font-weight:600">Прибыль</span><span class="frow-val profit-big">${fmt(profit/1000)}K ₸</span></div>
        <div class="frow"><span class="frow-lbl">Маржа</span><span class="frow-val" style="color:#185FA5">${Math.round(profit/rev*100)}%</span></div>
      </div>
      <div class="finance-card">
        <div class="finance-card-title"><i class="ti ti-credit-card"></i> Состояние оплат</div>
        <div class="frow"><span class="frow-lbl">Оплачено</span><span class="frow-val income">${fmt(paid/1000)}K ₸</span></div>
        <div class="frow"><span class="frow-lbl">Частично</span><span class="frow-val" style="color:#854F0B">${fmt(partial/1000)}K ₸</span></div>
        <div class="frow"><span class="frow-lbl">Не оплачено</span><span class="frow-val expense">${fmt(unpaid/1000)}K ₸</span></div>
      </div>
    </div>
    <div class="finance-card">
      <div class="finance-card-title"><i class="ti ti-package"></i> По статусам заказов</div>
      ${Object.entries(byStatus).map(([s,v])=>`
        <div class="frow">
          <span class="frow-lbl"><span class="badge ${STATUS_CLASS[s]}">${STATUS_LABELS[s]}</span> · ${v.count} зак.</span>
          <span style="display:flex;gap:14px"><span>${fmt(v.rev/1000)}K</span><span class="frow-val income">+${fmt(v.profit/1000)}K</span></span>
        </div>
      `).join('')}
    </div>
  `;
}

function renderDeadlines() {
  const sorted = [...data.orders].sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  document.getElementById('tab-deadlines').innerHTML = `
    <div class="section-header"><span class="section-title">Дедлайны</span></div>
    <div class="deadline-card">
      ${sorted.map(o=>{
        const days = daysUntil(o.deadline);
        const dotClass = days<0?'dot-red':days<=3?'dot-amber':'dot-green';
        const ddClass = days<0?'overdue':days<=3?'soon':'';
        const ddText = days<0?`Просрочен на ${Math.abs(days)} дн.`:days===0?'Сегодня!':days===1?'Завтра':`Через ${days} дней`;
        return `<div class="dl-item">
          <div class="dl-dot ${dotClass}"></div>
          <div class="dl-info">
            <div class="dl-name">${o.product}</div>
            <div class="dl-sub">${o.client} · <span class="badge ${STATUS_CLASS[o.status]}">${STATUS_LABELS[o.status]}</span></div>
          </div>
          <div class="dl-date ${ddClass}">${ddText}</div>
        </div>`;
      }).join('')}
    </div>
  `;
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(btn) btn.classList.add('active');
  ['orders','clients','finance','deadlines'].forEach(t=>{ document.getElementById('tab-'+t).style.display=t===tab?'':'none'; });
  if(tab==='orders') renderOrders();
  if(tab==='clients') renderClients();
  if(tab==='finance') renderFinance();
  if(tab==='deadlines') renderDeadlines();
}

function openModal(id) {
  const o = id ? data.orders.find(x=>x.id===id) : {id:null,client:'',product:'',supplier:'',qty:'',costPrice:'',salePrice:'',status:'new',payStatus:'unpaid',deadline:'',notes:'',material:''};
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-title">
          <span>${o.id?'Редактировать заказ':'Новый заказ'}</span>
          <button class="close-btn" onclick="closeModal()"><i class="ti ti-x"></i></button>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Клиент *</label><input id="f-client" value="${o.client}" placeholder="Имя клиента"></div>
          <div class="form-group"><label>Товар *</label><input id="f-product" value="${o.product}" placeholder="Название товара"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Поставщик</label><input id="f-supplier" value="${o.supplier}" placeholder="Название компании"></div>
          <div class="form-group"><label>Материал / Тип</label><input id="f-material" value="${o.material}" placeholder="Пластик, ткань, металл..."></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Количество</label><input id="f-qty" type="number" value="${o.qty}" placeholder="100"></div>
          <div class="form-group"><label>Себестоимость (₸)</label><input id="f-cost" type="number" value="${o.costPrice}" placeholder="50000"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Цена продажи (₸)</label><input id="f-sale" type="number" value="${o.salePrice}" placeholder="80000"></div>
          <div class="form-group"><label>Дедлайн</label><input id="f-deadline" type="date" value="${o.deadline}"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Статус заказа</label>
            <select id="f-status">
              <option value="new"${o.status==='new'?' selected':''}>Новый</option>
              <option value="transit"${o.status==='transit'?' selected':''}>В пути</option>
              <option value="customs"${o.status==='customs'?' selected':''}>Таможня</option>
              <option value="delivered"${o.status==='delivered'?' selected':''}>Доставлен</option>
            </select>
          </div>
          <div class="form-group"><label>Статус оплаты</label>
            <select id="f-pay">
              <option value="unpaid"${o.payStatus==='unpaid'?' selected':''}>Не оплачен</option>
              <option value="partial"${o.payStatus==='partial'?' selected':''}>Частично</option>
              <option value="paid"${o.payStatus==='paid'?' selected':''}>Оплачен</option>
            </select>
          </div>
        </div>
        <div class="form-group"><label>Заметки / Трекинг-номер</label><textarea id="f-notes" placeholder="Номер отслеживания, комментарий...">${o.notes}</textarea></div>
        <div class="modal-footer">
          <button class="btn-cancel" onclick="closeModal()">Отмена</button>
          <button class="primary" onclick="saveOrder(${o.id||'null'})">${o.id?'Сохранить':'Добавить заказ'}</button>
        </div>
      </div>
    </div>
  `;
}

function saveOrder(id) {
  const client = document.getElementById('f-client').value.trim();
  const product = document.getElementById('f-product').value.trim();
  if(!client||!product) { alert('Укажите клиента и название товара'); return; }
  const obj = {
    client, product,
    supplier: document.getElementById('f-supplier').value.trim(),
    material: document.getElementById('f-material').value.trim(),
    qty: parseInt(document.getElementById('f-qty').value)||0,
    costPrice: parseInt(document.getElementById('f-cost').value)||0,
    salePrice: parseInt(document.getElementById('f-sale').value)||0,
    deadline: document.getElementById('f-deadline').value,
    status: document.getElementById('f-status').value,
    payStatus: document.getElementById('f-pay').value,
    notes: document.getElementById('f-notes').value.trim(),
  };
  if(id!==null) { const i=data.orders.findIndex(x=>x.id===id); data.orders[i]={...data.orders[i],...obj}; }
  else { data.orders.push({id:data.nextId++,...obj}); }
  saveData();
  closeModal();
  renderStats();
  renderOrders();
}

function deleteOrder(id) {
  if(!confirm('Удалить этот заказ?')) return;
  data.orders = data.orders.filter(x=>x.id!==id);
  saveData();
  renderStats();
  renderOrders();
}

function closeModal() { document.getElementById('modal-container').innerHTML=''; }

renderStats();
renderOrders();
</script>
</body>
</html>
